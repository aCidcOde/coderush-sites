services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coderush-app
    volumes:
      - .:/var/www/html
    networks:
      - coderush

  nginx:
    image: nginx:alpine
    container_name: coderush-nginx
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - coderush

networks:
  coderush:
    driver: bridge
