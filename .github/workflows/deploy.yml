name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -sf \
            -X POST https://coderush.sistemavendadireta.com.br/deploy.php \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}"
